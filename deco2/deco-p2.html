        <!--HIDE DRAGGABLES-->        
    <script>
    let hidden = false;

    function toggleDraggables() {
    const items = document.querySelectorAll(".draggable");
    const btn = document.getElementById("toggleBtn");

    hidden = !hidden;

    items.forEach(el => {
        el.style.display = hidden ? "none" : "block";
    });

    btn.textContent = hidden ? "Show Pieces" : "Hide Pieces";
    }
    </script>

    <!-- FOR HEADER -->
<script>
$(function() {
    let z = 1000;

    function randomizePositions() {
        const container = $(".crop-container2");
        const placed = [];

        $(".draggable").each(function() {
            const el = $(this);

            const elW = el.outerWidth();
            const elH = el.outerHeight();

            const maxX = container.width() - elW;
            const maxY = container.height() - elH;

            let x, y;
            let attempts = 0;
            const minDist = 80; // smaller because header is small

            do {
                x = Math.random() * maxX;
                y = Math.random() * maxY;

                var tooClose = placed.some(p => {
                    const dx = p.x - x;
                    const dy = p.y - y;
                    return Math.sqrt(dx * dx + dy * dy) < minDist;
                });

                attempts++;
            } while (tooClose && attempts < 50);

            placed.push({ x, y });

            const rotation = Math.random() * 360;

            el.css({
                left: x + "px",
                top: y + "px",
                transform: "rotate(" + rotation + "deg)",
                "z-index": Math.floor(Math.random() * 100) + 1000
            });
        });
    }

    randomizePositions();

    $(".draggable").draggable({
        containment: false,
        scroll: false
    });

    $(".draggable").mousedown(function() {
        z++;
        $(this).css("z-index", z);
    });
});
</script>
